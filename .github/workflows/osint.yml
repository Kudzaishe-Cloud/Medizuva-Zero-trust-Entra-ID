name: OSINT Scan (6-hourly)

# OSINT runs separately because scanning all users across 4 APIs
# takes ~13 minutes due to rate limits — it cannot fit in a 15-min window.
# Runs every 6 hours so results are always reasonably fresh.
#
# Requires secrets: HIBP_API_KEY, DEHASHED_EMAIL, DEHASHED_API_KEY,
#                   LEAKCHECK_API_KEY, INTELX_API_KEY
# At least one OSINT key must be set or this job will fail.

on:
  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  osint:
    name: OSINT Scan → Threat Audit → Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Fetch real user accounts from Entra ID (fresh list before OSINT scan)
      - name: Fetch Entra ID users
        env:
          ENTRA_TENANT_ID:     ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_CLIENT_ID:     ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        run: python pillar1_identity/generate_personas.py

      # Run OSINT tools. If no API keys are configured, falls back to
      # deterministic simulate mode so the dashboard always has data.
      - name: OSINT exposure check
        env:
          HIBP_API_KEY:      ${{ secrets.HIBP_API_KEY }}
          DEHASHED_EMAIL:    ${{ secrets.DEHASHED_EMAIL }}
          DEHASHED_API_KEY:  ${{ secrets.DEHASHED_API_KEY }}
          LEAKCHECK_API_KEY: ${{ secrets.LEAKCHECK_API_KEY }}
          INTELX_API_KEY:    ${{ secrets.INTELX_API_KEY }}
        run: |
          # Auto-add --simulate when no real API keys are configured
          SIMULATE_FLAG=""
          if [ -z "$HIBP_API_KEY" ] && [ -z "$LEAKCHECK_API_KEY" ] && \
             [ -z "$INTELX_API_KEY" ] && [ -z "$DEHASHED_API_KEY" ]; then
            SIMULATE_FLAG="--simulate"
            echo "No OSINT API keys configured — running in simulate mode"
          fi
          python pillar4_threat/osint_exposure_check.py \
            --hibp-key       "$HIBP_API_KEY" \
            --dehashed-email "$DEHASHED_EMAIL" \
            --dehashed-key   "$DEHASHED_API_KEY" \
            --leakcheck-key  "$LEAKCHECK_API_KEY" \
            --intelx-key     "$INTELX_API_KEY" \
            $SIMULATE_FLAG

      # Pull fresh Entra security signals after OSINT
      - name: Entra ID sync
        env:
          ENTRA_TENANT_ID:     ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_CLIENT_ID:     ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        run: python shared/entra_sync.py

      # Pull sign-in logs, risky sign-ins, and directory audit logs
      - name: Entra ID log retrieval
        env:
          ENTRA_TENANT_ID:     ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_CLIENT_ID:     ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        run: python shared/entra_logs.py

      # Audit Conditional Access policies — produces data/ca_audit.json (Pillar 2)
      - name: CA policy audit
        env:
          ENTRA_TENANT_ID:     ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_CLIENT_ID:     ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        run: python shared/entra_ca.py

      # Audit PIM role assignments — produces data/pim_audit.json (Pillar 3)
      - name: PIM audit
        env:
          ENTRA_TENANT_ID:     ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_CLIENT_ID:     ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        run: python shared/entra_pim.py

      - name: Threat audit
        run: python pillar4_threat/threat_audit.py

      # Audit all 4 NIST standards — reads threat + OSINT data just generated
      - name: NIST compliance audit
        run: python shared/nist_compliance.py

      - name: Generate dashboard
        run: python dashboard/generate_central_dashboard.py

      - name: Copy to docs/
        run: |
          mkdir -p docs
          cp data/central_dashboard.html docs/index.html

      # Commit dashboard + OSINT results + NIST report so they persist
      # and are available to sync.yml between 6-hourly OSINT runs
      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add docs/index.html \
                  data/osint_results/osint_combined_results.json \
                  data/nist_compliance_report.json
          git diff --staged --quiet || \
            git commit -m "chore: 6h OSINT refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
