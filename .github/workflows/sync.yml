name: Sync Dashboard (15-min)

on:
  # Every 15 minutes — Entra ID signals + threat audit + dashboard rebuild
  schedule:
    - cron: "*/15 * * * *"

  # Manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    name: Entra Sync → Threat Audit → Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Pull risky users, MFA gaps, device gaps from Entra ID (or CSV fallback)
      - name: Entra ID sync
        env:
          ENTRA_TENANT_ID:     ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_CLIENT_ID:     ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        run: python shared/entra_sync.py

      # Classify all 500 users into risk tiers using real CSV + Entra signals
      - name: Threat audit
        run: python pillar4_threat/threat_audit.py

      # Rebuild dashboard HTML with latest data
      - name: Generate dashboard
        run: python dashboard/generate_central_dashboard.py

      # Publish to GitHub Pages
      - name: Copy to docs/
        run: |
          mkdir -p docs
          cp data/central_dashboard.html docs/index.html

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/threat_audit.json data/risky_users.json data/central_dashboard.html
          git diff --staged --quiet || \
            git commit -m "chore: 15-min refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
