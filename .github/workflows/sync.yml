name: Sync Dashboard (15-min)

on:
  # Every 15 minutes — fetch real Entra ID data, rebuild dashboard
  schedule:
    - cron: "*/15 * * * *"

  # Manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    name: Entra Fetch → Sync → Threat Audit → Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Fetch real user accounts from Entra ID via Microsoft Graph API
      - name: Fetch Entra ID users
        continue-on-error: true
        env:
          ENTRA_TENANT_ID:     ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_CLIENT_ID:     ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        run: python pillar1_identity/generate_personas.py

      # Pull risky users, MFA gaps, and device compliance gaps from Entra ID
      - name: Entra ID sync
        continue-on-error: true
        env:
          ENTRA_TENANT_ID:     ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_CLIENT_ID:     ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        run: python shared/entra_sync.py

      # Pull sign-in logs, risky sign-ins, and directory audit logs
      - name: Entra ID log retrieval
        continue-on-error: true
        env:
          ENTRA_TENANT_ID:     ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_CLIENT_ID:     ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        run: python shared/entra_logs.py

      # Audit Conditional Access policies — produces data/ca_audit.json (Pillar 2)
      - name: CA policy audit
        continue-on-error: true
        env:
          ENTRA_TENANT_ID:     ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_CLIENT_ID:     ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        run: python shared/entra_ca.py

      # Audit PIM role assignments — produces data/pim_audit.json (Pillar 3)
      - name: PIM audit
        continue-on-error: true
        env:
          ENTRA_TENANT_ID:     ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_CLIENT_ID:     ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        run: python shared/entra_pim.py

      # Classify users into risk tiers using real Entra signals
      - name: Threat audit
        run: python pillar4_threat/threat_audit.py

      # Audit all 4 NIST standards and produce nist_compliance_report.json
      - name: NIST compliance audit
        run: python shared/nist_compliance.py

      # Rebuild dashboard HTML with latest data embedded inline
      - name: Generate dashboard
        run: python dashboard/generate_central_dashboard.py

      # Publish to GitHub Pages (docs/index.html is the Pages source)
      - name: Copy to docs/
        run: |
          mkdir -p docs
          cp data/central_dashboard.html docs/index.html

      # Commit dashboard + NIST report so both persist between runs
      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin HEAD
          git add docs/index.html data/nist_compliance_report.json
          git diff --staged --quiet || \
            git commit -m "chore: 15-min refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD
